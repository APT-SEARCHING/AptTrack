line-length = 120
target-version = "py311"

[lint]
select = ["E", "F", "W", "I"]
ignore = [
    "E501",   # line too long — enforced by formatter, not linter
    "E711",   # comparison to True/False — SQLAlchemy requires == True idiom
    "E712",   # comparison to True — same as above (noqa comments already in place)
]

[lint.per-file-ignores]
"app/db/base.py" = ["F401"]  # model imports are required for Alembic, not "unused"
