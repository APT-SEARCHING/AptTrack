networks:
  app-network:
    driver: bridge

services:
  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - PYTHONPATH=/app
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - BACKEND_HOST=${BACKEND_HOST}
      - BACKEND_PORT=${BACKEND_PORT}
      - BACKEND_RELOAD=${BACKEND_RELOAD}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - SCRAPE_INTERVAL_MINUTES=${SCRAPE_INTERVAL_MINUTES}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - REDIS_URL=redis://redis:6379/0
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-}
      - SENDGRID_FROM_EMAIL=${SENDGRID_FROM_EMAIL:-noreply@apttrack.app}
      - SENDGRID_WEBHOOK_VERIFICATION_KEY=${SENDGRID_WEBHOOK_VERIFICATION_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_ADMIN_CHAT_ID=${TELEGRAM_ADMIN_CHAT_ID:-}
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost:3000}
      - DEFAULT_DEMO_CITY=${DEFAULT_DEMO_CITY:-San Jose}
      - LOG_LEVEL=${LOG_LEVEL}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - app-network
    command: >
      bash -c "
        while ! nc -z db ${DATABASE_PORT}; do
          echo 'Waiting for database...'
          sleep 1
        done
        cd /app
        export PYTHONPATH=/app
        alembic upgrade head
        uvicorn app.main:app --host ${BACKEND_HOST} --port ${BACKEND_PORT} ${BACKEND_RELOAD:+--reload}
      "

  frontend:
    build: ./app
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=${API_BASE_URL}
    networks:
      - app-network

  db:
    image: postgres:14-alpine
    ports:
      - "${DATABASE_PORT}:${DATABASE_PORT}"
    environment:
      - POSTGRES_USER=${DATABASE_USER}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
      - POSTGRES_DB=${DATABASE_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    command: celery -A app.worker worker --loglevel=info --concurrency=2
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - PYTHONPATH=/app
      - REDIS_URL=redis://redis:6379/0
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-}
      - SENDGRID_FROM_EMAIL=${SENDGRID_FROM_EMAIL:-noreply@apttrack.app}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_ADMIN_CHAT_ID=${TELEGRAM_ADMIN_CHAT_ID:-}
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost:3000}
      - DEFAULT_DEMO_CITY=${DEFAULT_DEMO_CITY:-San Jose}
      - LOG_LEVEL=${LOG_LEVEL}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - app-network

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    command: celery -A app.worker beat --loglevel=info --scheduler celery.beat.PersistentScheduler
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - PYTHONPATH=/app
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - LOG_LEVEL=${LOG_LEVEL}
    depends_on:
      - redis
      - celery-worker
    volumes:
      - ./backend:/app
      - celery_beat_data:/var/run/celery
    networks:
      - app-network

volumes:
  postgres_data:
  celery_beat_data: